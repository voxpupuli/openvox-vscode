name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RUBY_VERSION: "3.4"

jobs:
  release:
    name: Build and release VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out extension
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Set build metadata
        id: release
        shell: bash
        run: |
          package_version="$(node --print "require('./package.json').version")"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"

            if [[ "$tag_version" != "$package_version" ]]; then
              echo "::error::Tag version $tag_version does not match package.json version $package_version"
              exit 1
            fi

            echo "vsix=openvox-vscode-$package_version.vsix" >> "$GITHUB_OUTPUT"
          else
            echo "vsix=openvox-vscode-latest.vsix" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Build VSIX
        run: |
          mkdir -p artifacts
          npm run package -- --out "artifacts/${{ steps.release.outputs.vsix }}"

      - name: Create versioned GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "artifacts/${{ steps.release.outputs.vsix }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag

      - name: Upload latest development build
        if: github.ref_type != 'tag'
        id: development_artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openvox-vscode-latest
          path: artifacts/${{ steps.release.outputs.vsix }}
          if-no-files-found: error

      - name: Update latest development build issue
        if: github.ref_type != 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_URL: ${{ steps.development_artifact.outputs.artifact-url }}
        run: |
          issue_title="Latest development build"
          short_sha="${GITHUB_SHA::7}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          issue_body="$(cat <<EOF
          The latest VSIX development build from \`${GITHUB_REF_NAME}\` is available below.

          - [Download openvox-vscode-latest artifact](${ARTIFACT_URL})
          - Commit: [\`${short_sha}\`](${commit_url})
          - Workflow run: [${GITHUB_RUN_ID}](${run_url})

          > GitHub login is required to download workflow artifacts. The download expires according to the repository's artifact retention policy.

          This issue is updated automatically after every successful build on \`${GITHUB_REF_NAME}\`.
          EOF
          )"

          issue_number="$(
            gh issue list \
              --state all \
              --limit 100 \
              --json number,title \
              --jq ".[] | select(.title == \"${issue_title}\") | .number" \
              | head -n 1
          )"

          if [[ -n "$issue_number" ]]; then
            gh issue edit "$issue_number" \
              --body "$issue_body"
          else
            gh issue create \
              --title "$issue_title" \
              --body "$issue_body"
          fi
