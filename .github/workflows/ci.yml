name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  RUBY_VERSION: "3.4"

jobs:
  compile:
    name: TypeScript compile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out extension
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

  package:
    name: Build and verify VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out extension
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build and verify package contents
        run: npm run check

      - name: Package VSIX
        run: |
          mkdir -p artifacts
          ./node_modules/.bin/vsce package --out artifacts/openvox-vscode-ci.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openvox-vscode-ci
          path: artifacts/openvox-vscode-ci.vsix
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - compile
      - package
    steps:
      - run: echo "Test successful"
