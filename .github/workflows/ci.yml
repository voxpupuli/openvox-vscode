name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  RUBY_VERSION: "3.4"

jobs:
  compile:
    name: TypeScript compile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out extension
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

  package:
    name: Build and verify VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out extension
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build and verify package contents
        run: npm run check

      - name: Package VSIX
        run: |
          mkdir -p artifacts
          ./node_modules/.bin/vsce package --out artifacts/openvox-vscode-ci.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openvox-vscode-ci
          path: artifacts/openvox-vscode-ci.vsix
          if-no-files-found: error

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe # v24.1.0
        with:
          globs: '**/*.md'

  tests:
    name: Test suite
    if: always()
    needs:
      - compile
      - package
      - markdown-lint
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
